<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Merci – {{ form.title }}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: #f0f2f5; min-height: 100vh;
           display:flex; align-items:center; justify-content:center; }
    .thanks-card { border-radius: 1.2rem; box-shadow: 0 8px 32px rgba(0,0,0,.12); max-width:480px; }
    .check-circle { width:72px; height:72px; border-radius:50%;
                    background: linear-gradient(135deg,#4f8ef7,#6d5cdf);
                    display:flex; align-items:center; justify-content:center;
                    margin: 0 auto; }
  </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center w-100 px-3">
  <div class="card thanks-card text-center p-5 w-100" style="max-width:480px">
    <div class="check-circle mb-4">
      <i class="bi bi-check-lg text-white fs-2"></i>
    </div>
    <h3 class="fw-bold mb-2">Merci !</h3>
    <p class="text-muted mb-1">Votre réponse à</p>
    <p class="fw-semibold fs-5 mb-4">{{ form.title }}</p>
    <p class="text-muted mb-4">a bien été enregistrée.</p>
    <a href="{{ url_for('public.public_form', public_id=form.public_id, slug=form.slug) }}"
       class="btn btn-outline-primary">
      <i class="bi bi-arrow-left me-2"></i>Soumettre une nouvelle réponse
    </a>
  </div>
</div>
</body>
</html>
