{% extends "base.html" %}
{% block title %}Nouveau formulaire – ENSForm{% endblock %}
{% block topbar_title %}<h5 class="mb-0 fw-semibold">Nouveau formulaire</h5>{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-12 col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Créer un formulaire</h5>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold" for="title">Titre <span class="text-danger">*</span></label>
            <input type="text" id="title" name="title" class="form-control"
                   placeholder="Mon formulaire" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3"
                      placeholder="Description optionnelle…"></textarea>
          </div>
          <div class="mb-4 form-check form-switch">
            <input class="form-check-input" type="checkbox" id="allow_multiple"
                   name="allow_multiple" checked/>
            <label class="form-check-label" for="allow_multiple">
              Autoriser plusieurs réponses par appareil
            </label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-plus-lg me-1"></i>Créer et éditer
            </button>
            <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
